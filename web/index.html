<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrosys - Acesso Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="src/assets/css/styles.css">
</head>
<body class="d-flex align-items-center min-vh-100 position-relative">

    <i class="bi bi-shield-lock-fill floating-icon slow" style="font-size: 15rem; top: 10%; left: 5%;"></i>
    <i class="bi bi-database-fill-gear floating-icon fast" style="font-size: 12rem; bottom: 10%; right: 10%;"></i>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="glass-card p-4 p-md-5 fade-in-up">
                    
                    <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold rounded-pill" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold rounded-pill" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-pane" type="button" role="tab">Criar Conta</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="authTabsContent">
                        
                        <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
                            <div class="text-center mb-4">
                                <h4 class="fw-bold">Bem-vindo de volta</h4>
                                <p class="text-muted small">Acesse o sistema para gerenciar clientes</p>
                            </div>

                            <form id="form-login">
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Usuário</label>
                                    <input type="text" class="form-control" id="login-username" placeholder="Digite seu usuário" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-semibold">Senha</label>
                                    <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold shadow-sm">
                                    Entrar no Sistema <i class="bi bi-arrow-right ms-2"></i>
                                </button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="register-pane" role="tabpanel" tabindex="0">
                            <div class="text-center mb-4">
                                <h4 class="fw-bold">Novo Administrador</h4>
                                <p class="text-muted small">Crie sua credencial local criptografada</p>
                            </div>

                            <form id="form-register">
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Nome de Usuário</label>
                                    <input type="text" class="form-control" id="register-username" placeholder="Mínimo 3 caracteres" minlength="3" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Senha Mestre</label>
                                    <input type="password" class="form-control" id="register-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-semibold">Confirmar Senha</label>
                                    <input type="password" class="form-control" id="register-confirm-password" placeholder="Repita a senha" minlength="6" required>
                                </div>
                                <button type="submit" class="btn btn-dark w-100 py-2 rounded-3 fw-semibold shadow-sm">
                                    Cadastrar <i class="bi bi-person-plus ms-2"></i>
                                </button>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="dynamicModal" tabindex="-1" aria-labelledby="dynamicModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0 shadow-lg">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold" id="dynamicModalTitle">Aviso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-secondary" id="dynamicModalBody">
                    </div>
                <div class="modal-footer border-top-0" id="dynamicModalFooter">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@4.2.2/dist/alasql.min.js"></script>
    
    <script type="module">
        import { DataConfig } from './src/core/database/DataConfig.js';
        import { AuthController } from './src/controllers/AuthController.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            await DataConfig.init();
            AuthController.init();
        });
    </script>
</body>
</html>
